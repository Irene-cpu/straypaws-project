<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <title>Document</title>
</head>
<body>
    
    <section class="contact">
        <div class="class">
        <h2 style=" font-size: 30px;">Have question, want to help, or interested in adoption? 
        <br>We'd love to hear from you.</h2>
        <p style="margin-top: 20px;">Send us a message</p>
        </div>

        <form action="/contact" method="post">
            <label for="Name">Name : </label>
            <input type="text" id="Name" name="Name" placeholder="John Doe" required>
    
            <label for="email">Email : </label>
            <input type="email" id="email" name="email" placeholder="username@gmail.com" required>

            <label for="yourmessage">Your Message</label>
            <textarea id="yourmessage" name="message" required></textarea>

            <button type="submit">Send Message</button>
        </form>
    </section>

    <section class="form">
        <h3>Contact Us</h3>
        <div class="unorder">
        <ul>
        <li>Email : support@straypaws.org</li>
          <li>Phone : +60 12-345 6789</li>
          <li>Location : Kuala Lumpur, Malaysia</li>
          <li>Response Time : within 24 - 48 hours</li>
        </ul>
        </div>
    </section>

    


</body>
</html>
